<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 320px; height: 160px; overflow: hidden;
    font-family: -apple-system, "Hiragino Sans", system-ui, sans-serif;
    background: #F5EEE5;
    color: #2A1E14;
    border-radius: 16px;
    border: 1px solid #DDD0BF;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Setup screen ── */
  #setup {
    display: flex; flex-direction: column; gap: 8px;
    padding: 16px;
  }
  #setup p { font-size: 11px; color: #A8957E; margin-bottom: 2px; }
  #setup input {
    width: 100%; padding: 8px 10px;
    background: #FDFCFA; border: 1px solid #DDD0BF; border-radius: 8px;
    font-size: 12px; color: #2A1E14; outline: none;
  }
  #setup input:focus { border-color: #9B7153; }
  #setup button {
    align-self: flex-end;
    padding: 6px 14px;
    background: #9B7153; color: #FDFCFA;
    border: none; border-radius: 8px;
    font-size: 12px; cursor: pointer;
  }
  #setup button:hover { background: #7A5740; }

  /* ── Note input screen ── */
  #note { display: none; flex-direction: column; height: 160px; padding: 14px 14px 10px; }

  textarea {
    flex: 1; width: 100%; resize: none; border: none; outline: none;
    background: transparent; font-size: 13px; color: #2A1E14;
    font-family: inherit; line-height: 1.6;
    placeholder-color: #C8B9A5;
  }
  textarea::placeholder { color: #C8B9A5; }

  .bottom {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 8px; border-top: 1px solid #EDE3D5;
  }
  .hint { font-size: 10px; color: #C8B9A5; }

  #send-btn {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 12px;
    background: #9B7153; color: #FDFCFA;
    border: none; border-radius: 8px; font-size: 12px; cursor: pointer;
    transition: background 0.1s;
  }
  #send-btn:hover { background: #7A5740; }
  #send-btn:disabled { background: #DDD0BF; cursor: default; }

  /* ── Success flash ── */
  #success {
    display: none; align-items: center; justify-content: center;
    height: 160px; flex-direction: column; gap: 6px;
  }
  #success .check { font-size: 28px; }
  #success p { font-size: 13px; color: #7A6A58; }

  /* ── Error ── */
  .err { font-size: 10px; color: #c0392b; margin-top: 4px; }
</style>
</head>
<body>

<!-- Setup (first time) -->
<div id="setup">
  <p>Jarvis ウィジェット接続</p>
  <input id="server-url" type="text" placeholder="サーバーURL (例: http://localhost:3000)" />
  <input id="token-input" type="text" placeholder="ウィジェットトークン (memoriesページからコピー)" />
  <div id="setup-err" class="err"></div>
  <button id="connect-btn">接続する</button>
</div>

<!-- Note input -->
<div id="note">
  <textarea id="txt" placeholder="今考えてること、気づいたこと、なんでも..." autofocus></textarea>
  <div class="bottom">
    <span class="hint">⌘+Enter で送信</span>
    <button id="send-btn">記憶する</button>
  </div>
</div>

<!-- Success -->
<div id="success">
  <div class="check">✓</div>
  <p>記憶しました</p>
</div>

<script>
  const CFG_KEY = 'jarvis_cfg'

  function loadCfg() {
    try { return JSON.parse(localStorage.getItem(CFG_KEY) || 'null') } catch { return null }
  }
  function saveCfg(cfg) { localStorage.setItem(CFG_KEY, JSON.stringify(cfg)) }

  const cfg = loadCfg()

  const setupEl = document.getElementById('setup')
  const noteEl  = document.getElementById('note')
  const successEl = document.getElementById('success')

  if (cfg?.token && cfg?.serverUrl) {
    showNote()
  } else {
    showSetup()
  }

  function showSetup() {
    setupEl.style.display = 'flex'
    noteEl.style.display  = 'none'
    if (cfg?.serverUrl) document.getElementById('server-url').value = cfg.serverUrl
  }

  function showNote() {
    setupEl.style.display = 'none'
    noteEl.style.display  = 'flex'
    successEl.style.display = 'none'
    setTimeout(() => document.getElementById('txt')?.focus(), 50)
  }

  // Connect button
  document.getElementById('connect-btn').addEventListener('click', async () => {
    const serverUrl = document.getElementById('server-url').value.trim().replace(/\/$/, '')
    const token     = document.getElementById('token-input').value.trim()
    const errEl     = document.getElementById('setup-err')
    errEl.textContent = ''

    if (!serverUrl || !token) { errEl.textContent = 'URLとトークンを入力してください'; return }

    // Verify token
    try {
      const res = await fetch(`${serverUrl}/api/quick-note`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-widget-token': token },
        body: JSON.stringify({ text: '__ping__' }),
      })
      if (res.status === 401) { errEl.textContent = 'トークンが無効です'; return }
      saveCfg({ serverUrl, token })
      showNote()
    } catch {
      errEl.textContent = 'サーバーに接続できません'
    }
  })

  // Send note
  async function sendNote() {
    const txt = document.getElementById('txt').value.trim()
    if (!txt) return
    const btn = document.getElementById('send-btn')
    btn.disabled = true

    const { serverUrl, token } = loadCfg()
    try {
      await fetch(`${serverUrl}/api/quick-note`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-widget-token': token },
        body: JSON.stringify({ text: txt }),
      })
    } catch {}

    // Show success then close
    noteEl.style.display = 'none'
    successEl.style.display = 'flex'
    setTimeout(() => window.jarvis.closeInput(), 900)
  }

  document.getElementById('send-btn').addEventListener('click', sendNote)

  document.getElementById('txt').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); sendNote() }
    if (e.key === 'Escape') window.jarvis.closeInput()
  })
</script>
</body>
</html>
